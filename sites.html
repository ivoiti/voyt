<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Сайты — Янита Войт</title>
<meta name="description" content="20 многостраничных сайтов под разные ниши — дизайн и вёрстка Янита Войт.">
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root{--bg:#f3f1e9;--bg2:#eae6da;--ink:#1c2440;--soft:#46506e;--accent:#b0402a;--line:#d8d2c2}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--ink);font-family:'Inter',sans-serif;line-height:1.6}
h1,h2,h3{font-family:'Cormorant Garamond',serif;font-weight:600;line-height:1.1}
a{color:inherit;text-decoration:none}
.wrap{max-width:1140px;margin:0 auto;padding:0 26px}
header.nav{position:sticky;top:0;z-index:30;background:rgba(243,241,233,.9);backdrop-filter:blur(8px);border-bottom:1px solid var(--line)}
.nav-in{display:flex;align-items:center;justify-content:space-between;height:64px}
.logo{font-family:'Cormorant Garamond',serif;font-size:25px;font-weight:600}
.logo span{color:var(--accent)}
.back{font-size:14px;color:var(--soft)}
.back:hover{color:var(--accent)}
.head{padding:64px 0 26px}
.head .eyebrow{font-size:12px;letter-spacing:3px;text-transform:uppercase;color:var(--accent);margin-bottom:12px}
.head h1{font-size:clamp(34px,5vw,56px)}
.head p{margin-top:14px;color:var(--soft);font-size:18px;max-width:62ch}
.grid{display:grid;grid-template-columns:repeat(3,1fr);gap:22px;padding:20px 0 70px}
.card{display:flex;flex-direction:column;background:#fff;border:1px solid var(--line);border-radius:16px;overflow:hidden;transition:transform .25s,box-shadow .25s}
.card:hover{transform:translateY(-4px);box-shadow:0 18px 40px rgba(28,36,64,.12)}
.card .top{height:120px;display:flex;align-items:center;justify-content:center;font-family:'Cormorant Garamond',serif;font-size:30px;color:#fff;position:relative}
.card .body{padding:20px 22px}
.card .tag{font-size:11px;letter-spacing:1.5px;text-transform:uppercase;color:var(--accent)}
.card h3{font-size:23px;margin:6px 0 10px}
.card .open{font-size:14px;color:var(--accent);font-weight:500}
.card:hover .open{text-decoration:underline}
footer{border-top:1px solid var(--line);padding:36px 0;color:var(--soft);font-size:14px;text-align:center}
@media(max-width:860px){.grid{grid-template-columns:1fr 1fr}}
@media(max-width:560px){.grid{grid-template-columns:1fr}}
</style>
</head>
<body>
<header class="nav"><div class="wrap nav-in">
<a class="logo" href="index.html">Янита <span>Войт</span></a>
<a class="back" href="index.html">← На главную</a>
</div></header>

<section class="head"><div class="wrap">
<div class="eyebrow">Сайты под разные ниши</div>
<h1>Ещё 20 сайтов</h1>
<p>Сайты под разные ниши — каждый со своей палитрой, типографикой и структурой. Откройте любой в новой вкладке.</p>
</div></section>

<div class="wrap"><div class="grid" id="grid"></div></div>

<footer><div class="wrap">© 2026 Янита Войт · Москва</div></footer>

<script>
const items = [
 ["cafe-zerno","Кофейня «Зерно»","Кофейня · спешелти","linear-gradient(135deg,#b5652f,#7a4420)"],
 ["resto-terra","Ресторан «Terra»","Локальная кухня","linear-gradient(135deg,#9c7b3a,#3b2f1a)"],
 ["bakery-sahar","Кондитерская «Сахар»","Десерты на заказ","linear-gradient(135deg,#cf7a4e,#9c4f2a)"],
 ["barber-britva","Барбершоп «Бритва»","Мужские стрижки","linear-gradient(135deg,#c8a24a,#2c2418)"],
 ["yoga-prana","Йога-студия «Прана»","Йога и дыхание","linear-gradient(135deg,#3f8f6b,#21302a)"],
 ["dental-aqua","Стоматология «Аква Дент»","Клиника","linear-gradient(135deg,#0e9bc4,#10303a)"],
 ["fit-puls","Фитнес-клуб «Пульс»","Тренажёрный зал","linear-gradient(135deg,#19c37d,#0f1216)"],
 ["psy-opora","Психолог «Опора»","Частная практика","linear-gradient(135deg,#7a7a3c,#2a2b26)"],
 ["law-lex","Юрфирма «ЛЕКС»","Юридические услуги","linear-gradient(135deg,#1f4e8f,#1b2330)"],
 ["arch-forma","Архбюро «Форма»","Архитектура","linear-gradient(135deg,#b8553a,#161616)"],
 ["auto-motor","Автосервис «Мотор»","Ремонт авто","linear-gradient(135deg,#e0521f,#14171a)"],
 ["clean-chisto","Клининг «Чисто»","Уборка","linear-gradient(135deg,#13a36a,#143028)"],
 ["travel-meridian","Турагентство «Меридиан»","Путешествия","linear-gradient(135deg,#1f8fb0,#13262e)"],
 ["wedding-da","Свадебное «Да!»","Организация свадеб","linear-gradient(135deg,#b08754,#2b231e)"],
 ["it-nova","SaaS «Nova»","Платформа автоматизации","linear-gradient(135deg,#5b6cff,#0c0e14)"],
 ["flowers-fleur","Цветы «Флёр»","Цветочная мастерская","linear-gradient(135deg,#c25e7a,#33232c)"],
 ["jewel-karat","Ювелирный «Карат»","Украшения","linear-gradient(135deg,#caa45a,#13131a)"],
 ["plants-green","Питомник «Грин»","Растения","linear-gradient(135deg,#5a8a32,#1e2b1c)"],
 ["photo-svet","Фотограф «СВЕТ»","Фотография","linear-gradient(135deg,#5b54e6,#101012)"],
 ["dance-ritm","Школа танцев «Ритм»","Танцы","linear-gradient(135deg,#c0379a,#241a26)"]
];
const g = document.getElementById('grid');
items.forEach(([slug,name,tag,grad])=>{
 const url = "https://voyt-demo-"+slug+".netlify.app";
 const a = document.createElement('a');
 a.className='card'; a.href=url; a.target='_blank'; a.rel='noopener';
 const short = name.replace(/[«»]/g,'').split(' ').slice(-1)[0];
 a.innerHTML = '<div class="top" style="background:'+grad+'">'+short+'</div>'+
  '<div class="body"><div class="tag">'+tag+'</div><h3>'+name+'</h3><div class="open">Открыть сайт →</div></div>';
 g.appendChild(a);
});
</script>
</body>
</html>
