<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Шпаргалка — Кубки</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600;700&family=Marck+Script&family=PT+Serif:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
<style>
  :root{
    --gold:#a9832f;
    --gold-soft:#c9a85a;
    --ink:#1f3350;
    --body:#3c4d68;
    --sub:#365a86;
    --water:#2f6fa6;       /* акцент масти: вода */
    --water-soft:#bfddf2;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{
    background:#9fb6cc;
    font-family:'PT Serif',serif;color:var(--body);
    display:flex;justify-content:center;padding:30px;
  }
  .slide{
    position:relative;width:1200px;height:800px;overflow:hidden;
    background:
      radial-gradient(120% 90% at 80% -10%, #f3f8fd 0%, #e4f0fa 40%, #d3e5f5 75%, #c6dcf0 100%);
    box-shadow:0 24px 60px rgba(31,51,80,.35);
  }
  /* водная атмосфера — мягкие дуги-волны в углу */
  .wave{position:absolute;right:-120px;top:-160px;width:520px;height:520px;border-radius:50%;
    border:1.5px solid rgba(47,111,166,.18);}
  .wave.b{right:-60px;top:-100px;width:380px;height:380px;border-color:rgba(169,131,47,.16)}
  .wave.c{right:-10px;top:-40px;width:250px;height:250px;border-color:rgba(47,111,166,.14)}

  /* золотая рамка + уголки */
  .frame{position:absolute;inset:26px;border:1px solid rgba(169,131,47,.55);pointer-events:none}
  .corner{position:absolute;width:30px;height:30px;border:2px solid var(--gold)}
  .corner.tl{top:18px;left:18px;border-right:none;border-bottom:none}
  .corner.tr{top:18px;right:18px;border-left:none;border-bottom:none}
  .corner.bl{bottom:18px;left:18px;border-right:none;border-top:none}
  .corner.br{bottom:18px;right:18px;border-left:none;border-top:none}

  .inner{position:absolute;inset:26px;padding:40px 56px;display:flex;flex-direction:column}

  /* header */
  .head{display:flex;align-items:center;gap:22px}
  .suit-badge{width:88px;height:88px;flex:none;border-radius:50%;
    background:rgba(255,255,255,.6);border:1.5px solid var(--gold);
    display:flex;align-items:center;justify-content:center;color:var(--gold)}
  .suit-badge svg{width:52px;height:52px}
  .htext .kicker{font-family:'Marck Script',cursive;color:var(--gold);font-size:24px;line-height:1}
  .htext h1{font-family:'Cormorant Garamond',serif;font-weight:700;color:var(--ink);
    font-size:62px;line-height:1;letter-spacing:1px}
  .htext .sub{display:inline-flex;align-items:center;gap:8px;margin-top:6px;
    color:var(--water);font-style:italic;font-size:18px}
  .htext .sub svg{width:20px;height:20px;color:var(--water)}
  .head .spacer{flex:1}
  .head .el{text-align:center;color:var(--water);opacity:.85}
  .head .el svg{width:46px;height:46px}
  .head .el span{display:block;font-size:13px;letter-spacing:3px;text-transform:uppercase;margin-top:4px}

  .rule{height:1px;margin:22px 0 20px;
    background:linear-gradient(90deg,transparent,rgba(169,131,47,.6),transparent)}

  /* meanings */
  .meanings{display:grid;grid-template-columns:1fr 1fr;gap:14px 46px}
  .m{display:flex;align-items:flex-start;gap:14px}
  .rank{width:42px;height:42px;flex:none;border-radius:50%;border:1.5px solid var(--gold);
    color:var(--gold);display:flex;align-items:center;justify-content:center;
    font-family:'Cormorant Garamond',serif;font-weight:700;font-size:20px;background:rgba(255,255,255,.5)}
  .rank svg{width:24px;height:24px;color:var(--gold)}
  .m .t{padding-top:3px}
  .m .t b{font-family:'Cormorant Garamond',serif;color:var(--ink);font-size:23px;font-weight:600;display:block;line-height:1.1}
  .m .t span{font-size:16px;color:var(--body)}

  /* cards */
  .cards{margin-top:auto;display:flex;justify-content:center;gap:30px;align-items:flex-end}
  .card{text-align:center}
  .card .ph{width:165px;height:286px;border:3px solid var(--gold);border-radius:6px;
    background:#fff;overflow:hidden;box-shadow:0 12px 26px rgba(31,51,80,.25)}
  .card .ph img{width:100%;height:100%;object-fit:cover;display:block}
  .card .cap{margin-top:10px;font-family:'Cormorant Garamond',serif;color:var(--ink);font-size:19px;font-weight:500}
  .card:nth-child(odd){transform:translateY(-6px)}

  .ico{fill:none;stroke:currentColor;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
</style>
</head>
<body>
<div class="slide">
  <div class="wave"></div><div class="wave b"></div><div class="wave c"></div>
  <div class="frame"></div>
  <div class="corner tl"></div><div class="corner tr"></div><div class="corner bl"></div><div class="corner br"></div>

  <div class="inner">
    <div class="head">
      <div class="suit-badge">
        <svg viewBox="0 0 64 64"><path class="ico" d="M16 16 H48 C47 31 40.5 39 32 39 C23.5 39 17 31 16 16 Z"/><path class="ico" d="M32 39 V49"/><path class="ico" d="M23 53 C23 49 41 49 41 53"/><path class="ico" d="M22 53 H42"/><circle class="ico" cx="32" cy="23" r="3"/></svg>
      </div>
      <div class="htext">
        <div class="kicker">шпаргалка по картам</div>
        <h1>Кубки</h1>
        <div class="sub">
          <svg viewBox="0 0 64 64"><path class="ico" d="M32 8 C32 8 18 27 18 38 A14 14 0 1 0 46 38 C46 27 32 8 32 8 Z"/><path class="ico" d="M26 40 A7 7 0 0 0 33 47"/></svg>
          Вода · эмоции, любовь, творчество
        </div>
      </div>
      <div class="spacer"></div>
      <div class="el">
        <svg viewBox="0 0 64 64"><path class="ico" d="M32 8 C32 8 18 27 18 38 A14 14 0 1 0 46 38 C46 27 32 8 32 8 Z"/><path class="ico" d="M26 40 A7 7 0 0 0 33 47"/></svg>
        <span>вода</span>
      </div>
    </div>

    <div class="rule"></div>

    <div class="meanings">
      <div class="m"><div class="rank">I</div><div class="t"><b>Туз</b><span>начало любви, эмоциональный подъём</span></div></div>
      <div class="m"><div class="rank">III</div><div class="t"><b>Тройка</b><span>праздник, гармония, дружба</span></div></div>
      <div class="m"><div class="rank">VII</div><div class="t"><b>Семёрка</b><span>иллюзии, мечты, самообман</span></div></div>
      <div class="m"><div class="rank"><svg viewBox="0 0 64 64"><path class="ico" d="M12 44 V24 L22 32 L32 16 L42 32 L52 24 V44 Z"/><path class="ico" d="M12 48 H52"/></svg></div><div class="t"><b>Королева</b><span>чуткость, сострадание, интуиция</span></div></div>
    </div>

    <div class="cards">
      <div class="card"><div class="ph"><img src="../cards/cups_ace.jpg" alt="Туз Кубков"></div><div class="cap">Туз Кубков</div></div>
      <div class="card"><div class="ph"><img src="../cards/cups_three.jpg" alt="Тройка Кубков"></div><div class="cap">Тройка Кубков</div></div>
      <div class="card"><div class="ph"><img src="../cards/cups_seven.jpg" alt="Семёрка Кубков"></div><div class="cap">Семёрка Кубков</div></div>
      <div class="card"><div class="ph"><img src="../cards/cups_queen.jpg" alt="Королева Кубков"></div><div class="cap">Королева Кубков</div></div>
    </div>
  </div>
</div>
</body>
</html>
