<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Шпаргалка — Пентакли</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600;700&family=Marck+Script&family=PT+Serif:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
<style>
  :root{--gold:#a9832f;--ink:#1f3350;--body:#3c4d68;--sub:#365a86;--accent:#6f7a39}
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:#9fb6cc;font-family:'PT Serif',serif;color:var(--body);display:flex;justify-content:center;padding:30px}
  .slide{position:relative;width:1200px;height:800px;overflow:hidden;
    background:radial-gradient(120% 90% at 80% -10%, #f7f8f1 0%, #edefdf 40%, #e2e6cd 75%, #d7ddbd 100%);
    box-shadow:0 24px 60px rgba(31,51,80,.35)}
  .wave{position:absolute;right:-120px;top:-160px;width:520px;height:520px;border-radius:50%;border:1.5px solid rgba(111,122,57,.22)}
  .wave.b{right:-60px;top:-100px;width:380px;height:380px;border-color:rgba(169,131,47,.18)}
  .wave.c{right:-10px;top:-40px;width:250px;height:250px;border-color:rgba(111,122,57,.16)}
  .frame{position:absolute;inset:26px;border:1px solid rgba(169,131,47,.55)}
  .corner{position:absolute;width:30px;height:30px;border:2px solid var(--gold)}
  .corner.tl{top:18px;left:18px;border-right:none;border-bottom:none}
  .corner.tr{top:18px;right:18px;border-left:none;border-bottom:none}
  .corner.bl{bottom:18px;left:18px;border-right:none;border-top:none}
  .corner.br{bottom:18px;right:18px;border-left:none;border-top:none}
  .inner{position:absolute;inset:26px;padding:40px 56px;display:flex;flex-direction:column}
  .head{display:flex;align-items:center;gap:22px}
  .suit-badge{width:88px;height:88px;flex:none;border-radius:50%;background:rgba(255,255,255,.6);
    border:1.5px solid var(--gold);display:flex;align-items:center;justify-content:center;color:var(--gold)}
  .suit-badge svg{width:52px;height:52px}
  .htext .kicker{font-family:'Marck Script',cursive;color:var(--gold);font-size:24px;line-height:1}
  .htext h1{font-family:'Cormorant Garamond',serif;font-weight:700;color:var(--ink);font-size:62px;line-height:1;letter-spacing:1px}
  .htext .sub{display:inline-flex;align-items:center;gap:8px;margin-top:6px;color:var(--accent);font-style:italic;font-size:18px}
  .htext .sub svg{width:20px;height:20px;color:var(--accent)}
  .head .spacer{flex:1}
  .head .el{text-align:center;color:var(--accent);opacity:.9}
  .head .el svg{width:46px;height:46px}
  .head .el span{display:block;font-size:13px;letter-spacing:3px;text-transform:uppercase;margin-top:4px}
  .rule{height:1px;margin:22px 0 20px;background:linear-gradient(90deg,transparent,rgba(169,131,47,.6),transparent)}
  .meanings{display:grid;grid-template-columns:1fr 1fr;gap:14px 46px}
  .m{display:flex;align-items:flex-start;gap:14px}
  .rank{width:42px;height:42px;flex:none;border-radius:50%;border:1.5px solid var(--gold);color:var(--gold);
    display:flex;align-items:center;justify-content:center;font-family:'Cormorant Garamond',serif;font-weight:700;font-size:20px;background:rgba(255,255,255,.5)}
  .rank svg{width:24px;height:24px;color:var(--gold)}
  .m .t{padding-top:3px}
  .m .t b{font-family:'Cormorant Garamond',serif;color:var(--ink);font-size:23px;font-weight:600;display:block;line-height:1.1}
  .m .t span{font-size:16px;color:var(--body)}
  .cards{margin-top:auto;display:flex;justify-content:center;gap:30px;align-items:flex-end}
  .card{text-align:center}
  .card .ph{width:165px;height:286px;border:3px solid var(--gold);border-radius:6px;background:#fff;overflow:hidden;box-shadow:0 12px 26px rgba(31,51,80,.25)}
  .card .ph img{width:100%;height:100%;object-fit:cover;display:block}
  .card .cap{margin-top:10px;font-family:'Cormorant Garamond',serif;color:var(--ink);font-size:19px;font-weight:500}
  .card:nth-child(odd){transform:translateY(-6px)}
  .ico{fill:none;stroke:currentColor;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
</style>
</head>
<body>
<div class="slide">
  <div class="wave"></div><div class="wave b"></div><div class="wave c"></div>
  <div class="frame"></div>
  <div class="corner tl"></div><div class="corner tr"></div><div class="corner bl"></div><div class="corner br"></div>
  <div class="inner">
    <div class="head">
      <div class="suit-badge"><svg viewBox="0 0 64 64"><circle class="ico" cx="32" cy="32" r="18"/><path class="ico" d="M32 20 L39.1 41.7 L20.6 28.3 L43.4 28.3 L24.9 41.7 Z"/></svg></div>
      <div class="htext">
        <div class="kicker">шпаргалка по картам</div>
        <h1>Пентакли</h1>
        <div class="sub"><svg viewBox="0 0 64 64"><path class="ico" d="M16 48 C16 28 34 14 48 14 C48 34 34 48 16 48 Z"/><path class="ico" d="M22 44 C30 36 40 26 45 19"/></svg>Земля · финансы, здоровье, стабильность</div>
      </div>
      <div class="spacer"></div>
      <div class="el"><svg viewBox="0 0 64 64"><path class="ico" d="M16 48 C16 28 34 14 48 14 C48 34 34 48 16 48 Z"/><path class="ico" d="M22 44 C30 36 40 26 45 19"/></svg><span>земля</span></div>
    </div>
    <div class="rule"></div>
    <div class="meanings">
      <div class="m"><div class="rank">I</div><div class="t"><b>Туз</b><span>материальное благополучие, новые возможности</span></div></div>
      <div class="m"><div class="rank">VI</div><div class="t"><b>Шестёрка</b><span>щедрость, помощь, баланс</span></div></div>
      <div class="m"><div class="rank">IX</div><div class="t"><b>Девятка</b><span>самодостаточность, успех, изобилие</span></div></div>
      <div class="m"><div class="rank"><svg viewBox="0 0 64 64"><path class="ico" d="M22 18 a10 10 0 0 1 20 0 c0 8 -10 10 -10 18"/><circle class="ico" cx="32" cy="50" r="2.5"/></svg></div><div class="t"><b>Паж</b><span>обучение, стажировка, новый проект</span></div></div>
    </div>
    <div class="cards">
      <div class="card"><div class="ph"><img src="../cards/pents_ace.jpg" alt="Туз Пентаклей"></div><div class="cap">Туз</div></div>
      <div class="card"><div class="ph"><img src="../cards/pents_six.jpg" alt="Шестёрка Пентаклей"></div><div class="cap">Шестёрка</div></div>
      <div class="card"><div class="ph"><img src="../cards/pents_nine.jpg" alt="Девятка Пентаклей"></div><div class="cap">Девятка</div></div>
      <div class="card"><div class="ph"><img src="../cards/pents_page.jpg" alt="Паж Пентаклей"></div><div class="cap">Паж</div></div>
    </div>
  </div>
</div>
</body>
</html>
