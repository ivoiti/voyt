<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Шпаргалка — Жезлы</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600;700&family=Marck+Script&family=PT+Serif:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
<style>
  :root{--gold:#a9832f;--ink:#1f3350;--body:#3c4d68;--sub:#365a86;--accent:#b9722e}
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:#9fb6cc;font-family:'PT Serif',serif;color:var(--body);display:flex;justify-content:center;padding:30px}
  .slide{position:relative;width:1200px;height:800px;overflow:hidden;
    background:radial-gradient(120% 90% at 80% -10%, #fbf6f1 0%, #f0e7da 40%, #e6dccb 75%, #ddd0bb 100%);
    box-shadow:0 24px 60px rgba(31,51,80,.35)}
  .wave{position:absolute;right:-120px;top:-160px;width:520px;height:520px;border-radius:50%;border:1.5px solid rgba(185,114,46,.2)}
  .wave.b{right:-60px;top:-100px;width:380px;height:380px;border-color:rgba(169,131,47,.18)}
  .wave.c{right:-10px;top:-40px;width:250px;height:250px;border-color:rgba(185,114,46,.16)}
  .frame{position:absolute;inset:26px;border:1px solid rgba(169,131,47,.55)}
  .corner{position:absolute;width:30px;height:30px;border:2px solid var(--gold)}
  .corner.tl{top:18px;left:18px;border-right:none;border-bottom:none}
  .corner.tr{top:18px;right:18px;border-left:none;border-bottom:none}
  .corner.bl{bottom:18px;left:18px;border-right:none;border-top:none}
  .corner.br{bottom:18px;right:18px;border-left:none;border-top:none}
  .inner{position:absolute;inset:26px;padding:40px 56px;display:flex;flex-direction:column}
  .head{display:flex;align-items:center;gap:22px}
  .suit-badge{width:88px;height:88px;flex:none;border-radius:50%;background:rgba(255,255,255,.6);
    border:1.5px solid var(--gold);display:flex;align-items:center;justify-content:center;color:var(--gold)}
  .suit-badge svg{width:52px;height:52px}
  .htext .kicker{font-family:'Marck Script',cursive;color:var(--gold);font-size:24px;line-height:1}
  .htext h1{font-family:'Cormorant Garamond',serif;font-weight:700;color:var(--ink);font-size:62px;line-height:1;letter-spacing:1px}
  .htext .sub{display:inline-flex;align-items:center;gap:8px;margin-top:6px;color:var(--accent);font-style:italic;font-size:18px}
  .htext .sub svg{width:20px;height:20px;color:var(--accent)}
  .head .spacer{flex:1}
  .head .el{text-align:center;color:var(--accent);opacity:.9}
  .head .el svg{width:46px;height:46px}
  .head .el span{display:block;font-size:13px;letter-spacing:3px;text-transform:uppercase;margin-top:4px}
  .rule{height:1px;margin:20px 0 16px;background:linear-gradient(90deg,transparent,rgba(169,131,47,.6),transparent)}
  .meanings{display:grid;grid-template-columns:1fr 1fr;gap:11px 46px}
  .m{display:flex;align-items:flex-start;gap:13px}
  .rank{width:40px;height:40px;flex:none;border-radius:50%;border:1.5px solid var(--gold);color:var(--gold);
    display:flex;align-items:center;justify-content:center;font-family:'Cormorant Garamond',serif;font-weight:700;font-size:19px;background:rgba(255,255,255,.5)}
  .rank svg{width:23px;height:23px;color:var(--gold)}
  .m .t{padding-top:2px}
  .m .t b{font-family:'Cormorant Garamond',serif;color:var(--ink);font-size:21px;font-weight:600;display:block;line-height:1.1}
  .m .t span{font-size:15px;color:var(--body)}
  .cards{margin-top:auto;display:flex;justify-content:center;gap:22px;align-items:flex-end}
  .card{text-align:center}
  .card .ph{width:142px;height:246px;border:3px solid var(--gold);border-radius:6px;background:#fff;overflow:hidden;box-shadow:0 12px 26px rgba(31,51,80,.25)}
  .card .ph img{width:100%;height:100%;object-fit:cover;display:block}
  .card .cap{margin-top:9px;font-family:'Cormorant Garamond',serif;color:var(--ink);font-size:17px;font-weight:500}
  .card:nth-child(odd){transform:translateY(-6px)}
  .ico{fill:none;stroke:currentColor;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
</style>
</head>
<body>
<div class="slide">
  <div class="wave"></div><div class="wave b"></div><div class="wave c"></div>
  <div class="frame"></div>
  <div class="corner tl"></div><div class="corner tr"></div><div class="corner bl"></div><div class="corner br"></div>
  <div class="inner">
    <div class="head">
      <div class="suit-badge"><svg viewBox="0 0 64 64"><path class="ico" d="M32 56 V16"/><path class="ico" d="M32 26 C26 26 22 22 22 15"/><path class="ico" d="M32 32 C38 32 42 28 42 21"/><path class="ico" d="M32 9 V15 M29 12 H35"/></svg></div>
      <div class="htext">
        <div class="kicker">шпаргалка по картам</div>
        <h1>Жезлы</h1>
        <div class="sub"><svg viewBox="0 0 64 64"><path class="ico" d="M32 8 C39 20 41 27 37 36 C41 34 42 29 42 29 C46 39 40 54 32 54 C24 54 18 46 23 36 C25 40 27 39 28 37 C24 29 27 19 32 8 Z"/></svg>Огонь · энергия, карьера, амбиции</div>
      </div>
      <div class="spacer"></div>
      <div class="el"><svg viewBox="0 0 64 64"><path class="ico" d="M32 8 C39 20 41 27 37 36 C41 34 42 29 42 29 C46 39 40 54 32 54 C24 54 18 46 23 36 C25 40 27 39 28 37 C24 29 27 19 32 8 Z"/></svg><span>огонь</span></div>
    </div>
    <div class="rule"></div>
    <div class="meanings">
      <div class="m"><div class="rank">I</div><div class="t"><b>Туз</b><span>новое начинание, импульс, идея</span></div></div>
      <div class="m"><div class="rank">II</div><div class="t"><b>Двойка</b><span>планирование, выбор пути</span></div></div>
      <div class="m"><div class="rank">V</div><div class="t"><b>Пятёрка</b><span>конфликты, соперничество</span></div></div>
      <div class="m"><div class="rank">X</div><div class="t"><b>Десятка</b><span>бремя, усталость от обязательств</span></div></div>
      <div class="m"><div class="rank"><svg viewBox="0 0 64 64"><path class="ico" d="M12 44 V24 L22 32 L32 16 L42 32 L52 24 V44 Z"/><path class="ico" d="M12 48 H52"/></svg></div><div class="t"><b>Король</b><span>лидер, стратег, наставник</span></div></div>
    </div>
    <div class="cards">
      <div class="card"><div class="ph"><img src="../cards/wands_ace.jpg" alt="Туз Жезлов"></div><div class="cap">Туз</div></div>
      <div class="card"><div class="ph"><img src="../cards/wands_two.jpg" alt="Двойка Жезлов"></div><div class="cap">Двойка</div></div>
      <div class="card"><div class="ph"><img src="../cards/wands_five.jpg" alt="Пятёрка Жезлов"></div><div class="cap">Пятёрка</div></div>
      <div class="card"><div class="ph"><img src="../cards/wands_ten.jpg" alt="Десятка Жезлов"></div><div class="cap">Десятка</div></div>
      <div class="card"><div class="ph"><img src="../cards/wands_king.jpg" alt="Король Жезлов"></div><div class="cap">Король</div></div>
    </div>
  </div>
</div>
</body>
</html>
