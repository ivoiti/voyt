<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Таро: уверенный расклад — обложка</title>
<link rel="stylesheet" href="slide.css">
<style>
  .cover{display:flex;height:100%;align-items:center;gap:30px}
  .left{flex:1.15;display:flex;flex-direction:column;justify-content:center}
  .left .kicker{font-size:30px}
  .left h1{font-family:'Cormorant Garamond',serif;font-weight:700;color:var(--ink);
    font-size:84px;line-height:.98;letter-spacing:1px;margin:6px 0 4px}
  .left h1 em{font-style:italic;color:var(--gold);display:block;font-weight:600}
  .left .sub{color:var(--sub);font-style:italic;font-size:22px;margin-top:18px;max-width:480px;line-height:1.5}
  .author{margin-top:34px;display:flex;align-items:center;gap:14px}
  .author .ln{width:54px;height:1px;background:var(--gold)}
  .author .nm{font-family:'Marck Script',cursive;color:var(--gold);font-size:34px;line-height:1}
  .author .role{color:var(--sub);font-size:15px}

  .right{flex:.85;position:relative;height:560px;display:flex;align-items:center;justify-content:center}
  .fan{position:relative;width:430px;height:520px}
  .fan .card{position:absolute;width:230px;height:398px;border:4px solid var(--gold);border-radius:8px;
    overflow:hidden;background:#fff;box-shadow:0 18px 38px rgba(31,51,80,.32);top:60px;left:100px}
  .fan .card img{width:100%;height:100%;object-fit:cover;display:block}
  .fan .c1{transform:rotate(-13deg) translate(-92px,12px);z-index:1}
  .fan .c3{transform:rotate(13deg) translate(92px,12px);z-index:1}
  .fan .c2{transform:translateY(-20px);z-index:2}
</style>
</head>
<body>
<div class="slide">
  <div class="orb a"></div><div class="orb b"></div><div class="orb c"></div>
  <div class="frame"></div>
  <div class="corner tl"></div><div class="corner tr"></div><div class="corner bl"></div><div class="corner br"></div>

  <div class="inner">
    <div class="cover">
      <div class="left">
        <div class="kicker">авторский курс по Таро</div>
        <h1>Таро:<em>уверенный расклад</em></h1>
        <div class="sub">От первой карты — к точному, осознанному раскладу. Старшие и Младшие Арканы простым и глубоким языком.</div>
        <div class="author">
          <span class="ln"></span>
          <div><div class="nm">Жаннета</div><div class="role">автор курса · практик с опытом 5+ лет</div></div>
        </div>
      </div>
      <div class="right">
        <div class="fan">
          <div class="card c1"><img src="../cards/major_magician.jpg" alt="Маг"></div>
          <div class="card c3"><img src="../cards/major_priestess.jpg" alt="Верховная Жрица"></div>
          <div class="card c2"><img src="../cards/major_star.jpg" alt="Звезда"></div>
        </div>
      </div>
    </div>
  </div>
</div>
</body>
</html>
